{% extends 'base.html' %}
{% block content %}
<div style="max-width:580px;">
  <div style="margin-bottom:24px;">
    <a href="{% url 'notification_templates' %}" style="font-size:13px;color:var(--muted);">← Back to Templates</a>
    <div style="font-family:'DM Serif Display',serif;font-size:24px;margin-top:8px;">Edit Template</div>
    <div style="font-size:13px;color:var(--muted);margin-top:4px;">{{ template.get_notif_type_display }}</div>
  </div>

  <div style="background:var(--amber-light);border:1px solid #f5e0a0;border-radius:10px;padding:12px 16px;font-size:13px;color:var(--amber);margin-bottom:16px;">
    Available variables: <code style="background:rgba(0,0,0,.06);padding:1px 6px;border-radius:4px;">{user}</code>
    <code style="background:rgba(0,0,0,.06);padding:1px 6px;border-radius:4px;">{facility}</code>
    <code style="background:rgba(0,0,0,.06);padding:1px 6px;border-radius:4px;">{date}</code>
    <code style="background:rgba(0,0,0,.06);padding:1px 6px;border-radius:4px;">{start_time}</code>
    <code style="background:rgba(0,0,0,.06);padding:1px 6px;border-radius:4px;">{end_time}</code>
    <code style="background:rgba(0,0,0,.06);padding:1px 6px;border-radius:4px;">{status}</code>
  </div>

  <div class="card">
    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Subject / Title</label>
        <input type="text" name="subject" class="form-control" value="{{ template.subject }}"/>
      </div>
      <div class="form-group">
        <label class="form-label">Message Body</label>
        <textarea name="body" class="form-control" style="min-height:120px;font-family:monospace;font-size:13px;">{{ template.body }}</textarea>
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:10px;">
        <input type="checkbox" name="is_active" id="is_active" {% if template.is_active %}checked{% endif %} style="width:16px;height:16px;accent-color:var(--green);"/>
        <label for="is_active" style="font-size:14px;cursor:pointer;">Template is Active</label>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px;">
        <button type="submit" class="btn btn-primary">Save Template</button>
        <a href="{% url 'notification_templates' %}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
