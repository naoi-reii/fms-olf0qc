{% extends 'base.html' %}
{% block content %}
<style>
.notif-item{display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);transition:background .15s;}
.notif-item:last-child{border-bottom:none;}
.notif-item.unread{background:linear-gradient(to right, var(--green-light) 0%, transparent 100%);border-radius:8px;padding:14px 12px;}
.notif-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.notif-icon svg{width:17px;height:17px;}
.notif-body{flex:1;min-width:0;}
.notif-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;}
.notif-msg{font-size:13px;color:var(--muted);line-height:1.5;}
.notif-meta{font-size:11px;color:var(--muted);margin-top:5px;display:flex;gap:12px;align-items:center;}
.notif-actions{display:flex;gap:6px;flex-shrink:0;}
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:20px;}
.tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;text-decoration:none;}
.tab.active{color:var(--green);border-bottom-color:var(--green);}
.tab:hover:not(.active){color:var(--text);}
.priority-urgent{background:#fdf0ef;border-left:3px solid var(--red);border-radius:0 8px 8px 0;padding-left:12px;}
.priority-high{background:#fef9e7;border-left:3px solid var(--amber);border-radius:0 8px 8px 0;padding-left:12px;}
</style>

<!-- HEADER -->
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:12px;">
  <div>
    <div style="font-family:'DM Serif Display',serif;font-size:24px;">Notifications</div>
    <div style="font-size:13px;color:var(--muted);margin-top:4px;">Module 4 — All users</div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    {% if user.can_send_announcements %}
    <a href="{% url 'announcement_create' %}" class="btn btn-primary">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      Send Announcement
    </a>
    <a href="{% url 'announcement_list' %}" class="btn btn-outline btn-sm">Announcements</a>
    <a href="{% url 'notification_templates' %}" class="btn btn-outline btn-sm">Templates</a>
    {% endif %}
  </div>
</div>

<!-- TABS -->
<div class="tab-bar">
  <a href="?type=" class="tab {% if not filter_type %}active{% endif %}">All</a>
  <a href="?type=announcement" class="tab {% if filter_type == 'announcement' %}active{% endif %}">Announcements</a>
  <a href="?type=approval" class="tab {% if filter_type == 'approval' %}active{% endif %}">Approvals</a>
  <a href="?type=confirmation" class="tab {% if filter_type == 'confirmation' %}active{% endif %}">Bookings</a>
  <a href="?type=escalation" class="tab {% if filter_type == 'escalation' %}active{% endif %}">Escalations</a>
</div>

<div class="card">
  <div id="notification-list" hx-get="?type={{ filter_type }}" hx-trigger="every 10s" hx-swap="innerHTML">
    {% include 'partials/notification_list.html' %}
  </div>
</div>

{% endblock %}
