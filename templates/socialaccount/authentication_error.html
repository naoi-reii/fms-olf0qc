{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div style="max-width: 500px; margin: 60px auto; padding: 40px; background: var(--white); border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 4px 32px rgba(0,0,0,.06); text-align: center;">
    <div style="width: 64px; height: 64px; background: var(--red-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;">
        <svg style="width: 32px; height: 32px; color: var(--red);" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
    </div>

    <h2 style="font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--text); margin-bottom: 12px;">
        {% trans "Social Network Login Failure" %}
    </h2>

    <p style="font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 32px;">
        {% trans "An error occurred while attempting to login via your social network account." %}
    </p>

    <div style="display: flex; gap: 12px; justify-content: center;">
        <a href="{% url 'login' %}" class="btn btn-primary" style="flex: 1;">Back to Login</a>
    </div>
</div>
{% endblock %}
