<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Verify Identity – OLFU FMS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--green:#1a6b3a;--green-dark:#145430;--green-light:#e8f5ee;--bg:#f4f6f5;--white:#fff;--text:#1c2b22;--muted:#6b7c72;--border:#dde8e2;--red:#c0392b;--red-light:#fdf0ef;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-wrap{display:flex;width:860px;min-height:520px;background:var(--white);border-radius:20px;border:1px solid var(--border);overflow:hidden;box-shadow:0 4px 32px rgba(0,0,0,.06);}
.login-left{width:340px;background:var(--green);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;flex-shrink:0;}
.logo-circle{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
.logo-circle svg{width:44px;height:44px;color:#fff;}
.login-title{font-family:'DM Serif Display',serif;font-size:28px;color:#fff;text-align:center;line-height:1.2;}
.login-sub{font-size:12px;color:rgba(255,255,255,.65);text-align:center;margin-top:8px;letter-spacing:1.2px;text-transform:uppercase;}
.login-right{flex:1;padding:60px 80px;display:flex;flex-direction:column;justify-content:center;}
.form-head{margin-bottom:32px;}
.form-head h2{font-family:'DM Serif Display',serif;font-size:32px;color:var(--text);margin-bottom:8px;}
.form-head p{font-size:14px;color:var(--muted);}
.form-group{margin-bottom:20px;}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;}
.form-control{width:100%;height:44px;padding:0 16px;border-radius:10px;border:1px solid var(--border);font-family:inherit;font-size:14px;transition:all .2s;}
.form-control:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-light);}
.btn-login{width:100%;height:46px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s;margin-top:12px;}
.btn-login:hover{background:var(--green-dark);}
.msg{padding:12px 16px;background:var(--red-light);border:1px solid rgba(192,57,43,.1);border-radius:8px;color:var(--red);font-size:13px;margin-bottom:24px;text-align:center;}
.question-box{padding:16px;background:var(--bg);border-radius:10px;border:1px solid var(--border);margin-bottom:24px;}
.question-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:6px;}
.question-text{font-size:15px;color:var(--text);font-weight:600;}
.back-link{margin-top:24px;text-align:center;}
.back-link a{color:var(--muted);font-size:13px;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;}
.back-link a:hover{color:var(--text);}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-left">
    <div class="logo-circle">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
    </div>
    <div class="login-title">OLFU FMS</div>
    <div class="login-sub">Security Check</div>
  </div>
  <div class="login-right">
    <div class="form-head">
      <h2>Verify Identity</h2>
      <p>Please answer your security question to continue.</p>
    </div>

    {% if messages %}
      {% for message in messages %}
      <div class="msg">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <div class="question-box">
        <div class="question-label">Security Question</div>
        <div class="question-text">{{ security_question }}</div>
    </div>

    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Your Answer</label>
        <input type="text" name="answer" class="form-control" placeholder="Type your answer here..." required autofocus autocomplete="off"/>
      </div>
      <button type="submit" class="btn-login">Verify & Login</button>
    </form>

    <div class="back-link">
        <a href="{% url 'login' %}">
            <svg style="width:14px;height:14px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            Back to Login
        </a>
    </div>
  </div>
</div>
</body>
</html>
